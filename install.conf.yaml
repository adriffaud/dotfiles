- defaults:
    link:
        create: true
        relink: false
        force: false

- clean: ['~']

- link:
    ~/.gitconfig:
        path: gitconfig
        create: false
    ~/.vimrc:
        path: vimrc
        create: false
    ~/.Xresources:
        path: Xresources
        create: false
    ~/.config/i3: config/i3/
    ~/.config/polybar: config/polybar
    ~/.config/i3lock-fancier: config/i3lock-fancier
    ~/.config/dunst: config/dunst
    ~/.config/tilix: config/tilix
    ~/.config/rofi: config/rofi
    ~/.config/compton.conf: config/compton.conf
