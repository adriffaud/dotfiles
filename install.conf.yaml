- defaults:
    link:
        create: true
        relink: false
        force: false

- clean: ['~']

- shell:
    - [git submodule update --init --recursive, Installing submodules]

- link:
    ~/.zshenv: zshenv
    ~/.zprofile: zprofile
    ~/.zshrc: zshrc
    ~/.zpreztorc: zpreztorc
    ~/.zprezto: prezto
    ~/.gitconfig:
        path: gitconfig
        create: false
    ~/.vimrc:
        path: vimrc
        create: false
    ~/.Xresources:
        path: Xresources
        create: false
    ~/bin/volume: bin/volume
    ~/.config/i3: config/i3/
    ~/.config/polybar: config/polybar
    ~/.config/i3lock-fancier: config/i3lock-fancier
    ~/.config/dunst: config/dunst
    ~/.config/tilix: config/tilix
    ~/.config/rofi: config/rofi
    ~/.config/compton.conf: config/compton.conf
