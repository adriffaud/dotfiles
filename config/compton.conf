backend = "glx";
vsync = "none";
paint-on-overlay = true;
unredir-if-possible = true;
focus-exclude = [ "class_g = 'Cairo-clock'" ];

no-dock-shadow = true;
no-dnd-shadow = true;
clear-shadow = true;
shadow-opacity = true;

fading = false;

opacity-rule = [ "90:class_g = 'Code'" ];
blur-background = true;
blur-kern = "3x3box";
blur-method = "kawase";
blur-strength = 5;
